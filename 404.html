<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ページが見つかりません — Atelier de Ruka</title>
  <link rel="icon" type="image/png" href="images/icon-512.png?v=2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,600&family=Noto+Sans+JP:wght@400;600;700&family=Noto+Serif+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=5">
  <style>
    .error-page {
      min-height: 80vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 3rem 2rem;
      margin-top: 60px;
    }
    .error-code {
      font-family: 'Cormorant Garamond', serif;
      font-size: 7rem;
      font-weight: 400;
      color: var(--rose);
      line-height: 1;
      opacity: 0.25;
      margin-bottom: 1.5rem;
      letter-spacing: 0.1em;
    }
    .error-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }
    .error-title {
      font-family: 'Noto Serif JP', serif;
      font-size: 1.3rem;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 0.75rem;
      letter-spacing: 0.06em;
    }
    .error-sub {
      font-size: 0.88rem;
      color: var(--text-muted);
      line-height: 1.8;
      margin-bottom: 2.5rem;
    }
    .error-links {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .error-btn {
      display: inline-block;
      padding: 0.7rem 1.8rem;
      border-radius: 999px;
      font-size: 0.88rem;
      text-decoration: none;
      transition: opacity 0.18s;
    }
    .error-btn:hover { opacity: 0.8; }
    .error-btn-primary {
      background: var(--rose);
      color: #fff;
    }
    .error-btn-ghost {
      border: 1px solid var(--border);
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <header>
    <span class="site-title">Atelier de Ruka</span>
    <nav>
      <a href="index.html">ホーム</a>
      <a href="works.html" target="_blank">作品一覧</a>
      <a href="order.html">オーダー</a>
    </nav>
  </header>

  <main>
    <div class="error-page">
      <div class="error-code">404</div>
      <div class="error-icon">🌹</div>
      <h1 class="error-title">ページが見つかりません</h1>
      <p class="error-sub">
        お探しのページは移動・削除されたか、<br>URLが間違っている可能性があります。
      </p>
      <div class="error-links">
        <a href="index.html" class="error-btn error-btn-primary">ホームへ戻る</a>
        <a href="works.html" class="error-btn error-btn-ghost">作品一覧を見る</a>
      </div>
    </div>
  </main>

  <footer>
    <p class="footer-site-name">Atelier de Ruka</p>
    <nav class="footer-legal">
      <a href="tokusho.html">特定商取引法に基づく表記</a>
      <a href="privacy.html">プライバシーポリシー</a>
    </nav>
    <p class="footer-copy">© 2026 All Rights Reserved</p>
  </footer>

  <script src="config.js"></script>
</body>
</html>
