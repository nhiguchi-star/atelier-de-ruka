<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Handmade Works</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,600&family=Noto+Sans+JP:wght@400;600;700&family=Noto+Serif+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="images/icon-512.png?v=2">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/images/icon-512.png">
  <meta name="theme-color" content="#c8698a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Atelier de Ruka">
  <!-- OGP -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Atelier de Ruka">
  <meta property="og:title" content="Atelier de Ruka">
  <meta property="og:description" content="手に取った瞬間、ときめきが止まることのない宝箱を。高密度なホイップデコケースを一点ずつ丁寧に制作しています。">
  <meta property="og:url" content="https://atelier-de-ruka.vercel.app/">
  <meta property="og:image" content="https://atelier-de-ruka.vercel.app/images/icon-512.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Atelier de Ruka">
  <meta name="twitter:description" content="手に取った瞬間、ときめきが止まることのない宝箱を。高密度なホイップデコケースを一点ずつ丁寧に制作しています。">
  <meta name="twitter:image" content="https://atelier-de-ruka.vercel.app/images/icon-512.png">
  <link rel="stylesheet" href="style.css?v=5">
</head>
<body>

  <header>
    <span class="site-title" id="js-site-title">Handmade Works</span>
    <nav>
      <a href="works.html" target="_blank">作品一覧</a>
      <a href="order.html">オーダー</a>
      <a href="tokusho.html">特定商取引法</a>
      <a href="#connect">SNS・ショップ</a>
      <a href="about.html" target="_blank">作家について</a>
    </nav>
  </header>

  <!-- ヒーロー -->
  <section class="hero">
    <!-- 作品コラージュ背景（2×2グリッド） -->
    <div class="hero-bg" aria-hidden="true">
      <img src="images/collage1.jpg" class="hero-bg-img" alt="">
      <img src="images/collage5.jpg" class="hero-bg-img" alt="">
      <img src="images/collage2.jpg" class="hero-bg-img" alt="">
      <img src="images/collage3.jpg" class="hero-bg-img" alt="">
      <div class="hero-bg-fade"></div>
    </div>
    <!-- メインコンテンツ -->
    <div class="hero-content">
      <div class="hero-logo-wrap">
        <img src="images/logo.png" alt="Atelier de Ruka" class="hero-logo-img">
      </div>
<h1 id="js-hero-title" class="hero-tagline"></h1>
      <p id="js-hero-sub" class="hero-sub"></p>
    </div>
  </section>

  <main>
    <!-- SNSバー -->
    <section id="hero-sns-bar">
      <div class="hero-sns-bar-inner">
        <div class="hero-sns-links" id="js-hero-sns"></div>
      </div>
    </section>

    <!-- 作品一覧 -->
    <section id="works">
      <div class="section-wrap">
        <p class="section-label">WORKS</p>
        <h2 class="section-heading">作品一覧</h2>
        <div class="works-container" id="js-works-grid">
          <p class="loading">読み込み中...</p>
        </div>
      </div>
    </section>

    <!-- オーダーCTA -->
    <section id="order-cta">
      <div class="order-cta-wrap">
        <div class="order-cta-inner">
          <p class="order-cta-label">ORDER</p>
          <h2 class="order-cta-title">あなただけの作品を<br>オーダーしませんか？</h2>
          <p class="order-cta-sub">色・デザイン・パーツをご希望に合わせてお作りします</p>
          <a href="order.html" class="order-cta-btn">オーダーページへ →</a>
        </div>
      </div>
    </section>

    <!-- SNS・ショップ -->
    <section id="connect">
      <div class="section-wrap" style="text-align:center;">
        <p class="section-label" style="justify-content:center;">CONNECT</p>
        <h2 class="section-heading">SNS・ショップ</h2>
        <div class="connect-grid" id="js-connect-links"></div>
      </div>
    </section>
  </main>

  <footer>
    <p class="footer-site-name" id="js-footer-name">Handmade Works</p>
    <nav class="footer-legal">
      <a href="tokusho.html">特定商取引法に基づく表記</a>
    </nav>
    <p class="footer-copy">© 2026 All Rights Reserved</p>
  </footer>

  <!-- ボトムナビ（スマホ専用） -->
  <nav class="bottom-nav">
    <a href="index.html" class="bottom-nav-item" data-page="index">
      <span class="bottom-nav-icon">🌸</span>
      <span class="bottom-nav-label">ホーム</span>
    </a>
    <a href="works.html" target="_blank" class="bottom-nav-item" data-page="works">
      <span class="bottom-nav-icon">🌹</span>
      <span class="bottom-nav-label">作品一覧</span>
    </a>
    <a href="order.html" class="bottom-nav-item" data-page="order">
      <span class="bottom-nav-icon">💌</span>
      <span class="bottom-nav-label">オーダー</span>
    </a>
    <a href="#connect" class="bottom-nav-item" data-page="connect">
      <span class="bottom-nav-icon">🎀</span>
      <span class="bottom-nav-label">ショップ</span>
    </a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
