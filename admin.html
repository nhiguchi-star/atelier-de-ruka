<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理ページ — Atelier de Ruka</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="icon" type="image/png" href="images/icon-512.png?v=2">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Sans+JP:wght@400;600;700&family=Noto+Serif+JP:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:          #fdf8f2;
      --bg-card:     #fffef9;
      --bg-elevated: #fdf5ee;
      --text:        #3d2b1f;
      --text-muted:  #9a8472;
      --rose:        #c8698a;
      --rose-light:  #e8b0c4;
      --rose-pale:   #fdf0f4;
      --gold:        #b8933e;
      --border:      #e5d8c8;
      --error:       #c0392b;
      --success:     #5d8a5e;
      --shadow:      rgba(180,140,100,0.12);
    }

    body {
      font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic Pro', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    header {
      background: rgba(255,251,248,0.97);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      font-style: italic;
      font-weight: 600;
      color: var(--rose);
      letter-spacing: 0.04em;
    }

    header a {
      color: var(--text-muted);
      font-size: 0.82rem;
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.2s;
    }
    header a:hover { color: var(--rose); }

    .page {
      max-width: 860px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    .page-heading {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.3rem;
      letter-spacing: 0.04em;
    }

    .page-heading-sub {
      font-size: 0.78rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 2rem;
    }

    /* フォームカード */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.75rem;
      margin-bottom: 2.5rem;
      box-shadow: 0 2px 12px var(--shadow);
    }

    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 1.25rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
      letter-spacing: 0.04em;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .form-group.full { grid-column: 1 / -1; }

    label {
      font-size: 0.78rem;
      color: var(--text-muted);
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    label .required {
      color: var(--rose);
      margin-left: 0.2rem;
    }

    input, textarea, select {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.875rem;
      padding: 0.6rem 0.85rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--rose-light);
      box-shadow: 0 0 0 3px rgba(200,105,138,0.1);
    }

    textarea { resize: vertical; min-height: 80px; }

    select option { background: var(--bg-card); }

    /* ドロップゾーン */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 2rem 1rem;
      cursor: pointer;
      text-align: center;
      background: var(--bg-elevated);
      transition: border-color 0.18s, background 0.18s;
      margin-top: 0.35rem;
    }

    .drop-zone:hover { border-color: var(--rose-light); background: var(--rose-pale); }

    .drop-zone.drag-over {
      border-color: var(--rose);
      background: var(--rose-pale);
    }

    .drop-zone.has-file { border-color: var(--success); border-style: solid; }

    .drop-zone-icon { font-size: 2rem; margin-bottom: 0.5rem; }

    .drop-zone-main {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin: 0 0 0.2rem;
    }

    .drop-zone-sub {
      font-size: 0.75rem;
      color: var(--text-muted);
      opacity: 0.65;
      margin: 0;
    }

    /* 画像プレビュー */
    .img-preview {
      width: 100%;
      aspect-ratio: 3/2;
      border-radius: 8px;
      overflow: hidden;
      background: var(--bg-elevated);
      margin-top: 0.5rem;
      display: none;
      border: 1px solid var(--border);
    }

    .img-preview:has(img) { display: block; }

    .img-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ボタン */
    .btn {
      padding: 0.65rem 1.5rem;
      border-radius: 999px;
      border: none;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s;
      letter-spacing: 0.03em;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--rose), var(--gold));
      color: #fff;
      box-shadow: 0 3px 12px rgba(200,105,138,0.3);
    }

    .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-danger {
      background: rgba(192,57,43,.08);
      color: var(--error);
      border: 1px solid rgba(192,57,43,.2);
      padding: 0.35rem 0.85rem;
      font-size: 0.8rem;
    }

    .btn-danger:hover { background: rgba(192,57,43,.15); }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 0.35rem 0.85rem;
      font-size: 0.8rem;
    }

    .btn-ghost:hover { color: var(--text); border-color: var(--text-muted); }

    .form-actions {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      margin-top: 1.5rem;
    }

    /* トースト通知 */
    #js-toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      padding: 0.75rem 1.25rem;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.25s;
      pointer-events: none;
      z-index: 999;
    }

    #js-toast.show { opacity: 1; transform: translateY(0); }
    #js-toast.success { background: #f0f9f0; color: var(--success); border: 1px solid rgba(93,138,94,.3); }
    #js-toast.error   { background: #fdf0f0; color: var(--error);   border: 1px solid rgba(192,57,43,.3); }

    /* 作品一覧 */
    .works-list-header {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 1rem;
      letter-spacing: 0.04em;
    }

    #js-works-list { display: flex; flex-direction: column; gap: 0.75rem; }

    .work-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      display: grid;
      grid-template-columns: 64px 1fr auto;
      gap: 1rem;
      align-items: center;
      box-shadow: 0 1px 6px var(--shadow);
      transition: box-shadow 0.18s;
    }

    .work-item:hover { box-shadow: 0 3px 14px var(--shadow); }

    .work-thumb {
      width: 64px;
      height: 64px;
      border-radius: 8px;
      object-fit: cover;
      background: var(--bg-elevated);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.75rem;
      flex-shrink: 0;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .work-thumb img { width: 100%; height: 100%; object-fit: cover; }

    .work-info-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.25rem;
    }

    .work-info-meta {
      font-size: 0.775rem;
      color: var(--text-muted);
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .meta-badge { color: var(--rose); }

    .meta-link {
      color: var(--gold);
      text-decoration: none;
      font-size: 0.775rem;
    }

    .meta-link:hover { text-decoration: underline; }

    .meta-no-link {
      color: var(--text-muted);
      font-size: 0.775rem;
      font-style: italic;
    }

    label small {
      font-weight: 400;
      color: var(--text-muted);
    }

    /* 画像リサイズコントロール */
    .img-resize-ctrl {
      margin-top: 0.6rem;
      padding: 0.75rem 1rem;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.8rem;
    }
    .resize-orig-size {
      display: block;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      font-size: 0.75rem;
    }
    .resize-inputs {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .resize-inputs label {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.78rem;
      color: var(--text-muted);
      font-weight: 600;
    }
    .resize-inputs input[type="number"] {
      width: 90px;
      padding: 0.3rem 0.5rem;
      font-size: 0.82rem;
    }
    .resize-inputs input[type="checkbox"] {
      width: auto;
      margin: 0;
    }
    .resize-sep { color: var(--text-muted); font-size: 0.9rem; }

    .work-actions { display: flex; gap: 0.5rem; }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
      background: var(--bg-card);
      border: 1px dashed var(--border);
      border-radius: 10px;
    }

    @media (max-width: 560px) {
      .form-grid { grid-template-columns: 1fr; }
      .work-item { grid-template-columns: 48px 1fr; }
      .work-actions { grid-column: 1 / -1; }
    }

    /* カテゴリ別グループ */
    .category-section { margin-bottom: 2rem; }
    .category-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.55rem 1rem;
      background: var(--rose-pale);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 0.6rem;
    }
    .category-name { font-weight: 700; color: var(--rose); font-size: 0.9rem; letter-spacing: 0.03em; }
    .category-count { font-size: 0.78rem; color: var(--text-muted); }
    .category-works { display: flex; flex-direction: column; gap: 0.6rem; padding-left: 0.5rem; }
    .meta-date { font-size: 0.72rem; color: var(--text-muted); }

    /* 複数エントリーブロック */
    .entry-block + .entry-block { margin-top: 1.5rem; }
    .entry-block-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .entry-block-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--rose);
    }
    .entry-divider {
      border: none;
      border-top: 2px dashed var(--border);
      margin: 0 0 1.25rem;
    }
    .add-entry-btn {
      width: 100%;
      margin: 1.25rem 0 0;
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 0.7rem;
      background: transparent;
      color: var(--rose);
      font-weight: 600;
      font-size: 0.88rem;
      cursor: pointer;
      transition: all 0.18s;
      font-family: inherit;
    }
    .add-entry-btn:hover { background: var(--rose-pale); border-color: var(--rose-light); }

    /* パスワード認証オーバーレイ */
    #js-auth-overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, var(--rose-pale), #fff8f0);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 340px;
      text-align: center;
      box-shadow: 0 8px 36px rgba(180,140,100,0.15);
    }

    .auth-logo {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      margin: 0 auto 1.2rem;
      display: block;
      border: 2px solid var(--border);
    }

    .auth-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-weight: 600;
      font-style: italic;
      color: var(--rose);
      margin-bottom: 0.2rem;
      letter-spacing: 0.04em;
    }

    .auth-sub {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: 1.6rem;
    }

    #js-auth-input {
      width: 100%;
      margin-bottom: 0.75rem;
      text-align: center;
      letter-spacing: 0.12em;
    }

    .auth-error {
      color: var(--error);
      font-size: 0.8rem;
      margin-bottom: 0.75rem;
      min-height: 1.2em;
    }
  </style>
</head>
<body>

  <!-- パスワード認証オーバーレイ -->
  <div id="js-auth-overlay">
    <div class="auth-card">
      <img src="images/icon-512.png" alt="Atelier de Ruka" class="auth-logo">
      <p class="auth-title">Atelier de Ruka</p>
      <p class="auth-sub">管理ページ — パスワードを入力してください</p>
      <form id="js-auth-form">
        <input type="password" id="js-auth-input" placeholder="パスワード" autocomplete="current-password">
        <p id="js-auth-error" class="auth-error"></p>
        <button type="submit" class="btn btn-primary" style="width:100%;">ログイン</button>
      </form>
    </div>
  </div>

  <header>
    <span class="header-title">Atelier de Ruka — 管理</span>
    <a href="index.html">← サイトへ戻る</a>
  </header>

  <div class="page">
    <p class="page-heading-sub">Admin Dashboard</p>
    <h1 class="page-heading">作品管理</h1>

    <!-- 作品追加フォーム -->
    <div class="card">
      <p class="card-title" id="js-form-title">🌹 新しい作品を追加</p>
      <form id="js-add-form">

        <!-- エントリーブロックはJSで動的生成 -->
        <div id="js-entries-container"></div>

        <!-- もう1件追加ボタン -->
        <button type="button" id="js-add-entry-btn" class="add-entry-btn" style="display:none;">
          ＋ もう1件追加
        </button>

        <div class="form-actions" style="margin-top:1.25rem;">
          <button type="submit" class="btn btn-primary" id="js-submit-btn">追加する</button>
          <button type="reset" class="btn btn-ghost">リセット</button>
          <button type="button" class="btn btn-ghost" id="js-cancel-btn" style="display:none;color:var(--error);">キャンセル</button>
        </div>
      </form>
    </div>

    <!-- 作品一覧 -->
    <p class="works-list-header">🌸 登録済みの作品 <span id="js-works-count" style="color:var(--text-muted);font-size:0.85rem;font-weight:400;font-family:inherit;"></span></p>
    <div id="js-works-list">
      <div class="empty-state">読み込み中...</div>
    </div>

  </div>

  <div id="js-toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="admin.js"></script>
</body>
</html>
